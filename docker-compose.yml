version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: hfi-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - hfi-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  api:
    build:
      context: .
      dockerfile: src/api/Dockerfile
    container_name: hfi-api
    env_file: .env
    environment:
      - DATABASE_URL=sqlite:////app/data/hfi.db
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL}
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGINS=http://localhost:3000
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - hfi-network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: hfi-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - hfi-network

  processor:
    build:
      context: .
      dockerfile: src/processor/Dockerfile
    container_name: hfi-processor
    env_file: .env
    environment:
      - DATABASE_URL=sqlite:////app/data/hfi.db
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - hfi-network

  scraper:
    build:
      context: .
      dockerfile: src/scraper/Dockerfile
    container_name: hfi-scraper
    env_file: .env
    environment:
      - DATABASE_URL=sqlite:////app/data/hfi.db
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - hfi-network
    command: tail -f /dev/null

  telegram-bot:
    build:
      context: .
      dockerfile: src/telegram_bot/Dockerfile
    container_name: hfi-telegram-bot
    env_file: .env
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - API_BASE_URL=http://api:8000
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD}
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - hfi-network

volumes:
  redis_data:
    driver: local

networks:
  hfi-network:
    driver: bridge
